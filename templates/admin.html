{% extends "base.html" %}
{% block content %}
<h1>Admin Panel - All Users</h1>
<table border="1" cellpadding="5">
  <!-- should probably not use a table for this -->
  <tr><th>Username</th><th>Role</th><th>Action</th></tr>
  {% for user in users %}
    <tr>
      <td>{{ user.username }}</td>
      <td>{{ user.role }}</td>
      <td>
        {% if user.username != session.username %}
          <form method="POST" action="{{ url_for('delete_user', username=user.username) }}" style="display:inline">
            <button type="submit" onclick="return confirm('Delete user {{ user.username }}?')">Delete</button>
          </form>
        {% else %}
          (you)
        {% endif %}
      </td>
    </tr>
  {% endfor %}
</table>
{% endblock %}
